name: Test R Scripts

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.R'
      - '**/*.r'
      - 'renv.lock'
      - 'ch00-tech-prep/tests/run_all_r.sh'
      - 'ch00-tech-prep/tests/ci/**'
      - '.github/workflows/test_r_scripts.yml'
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.R'
      - '**/*.r'
      - 'renv.lock'
      - 'ch00-tech-prep/tests/run_all_r.sh'
      - 'ch00-tech-prep/tests/ci/**'
      - '.github/workflows/test_r_scripts.yml'
  workflow_dispatch:

jobs:
  test-r:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            os_name: linux
          - os: macos-14
            os_name: macos
          - os: windows-2022
            os_name: windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine R test targets
        id: r-test-targets
        shell: bash
        run: |
          python_cmd=python3
          if ! command -v "$python_cmd" >/dev/null 2>&1; then
            python_cmd=python
          fi
          "$python_cmd" ch00-tech-prep/tests/ci/select_test_targets.py \
            --kind r \
            --event-name "${{ github.event_name }}" \
            --base "${{ github.event.pull_request.base.sha || github.event.before }}" \
            --head "${{ github.sha }}" \
            >> "$GITHUB_OUTPUT"

      - name: Setup Windows paths (Windows)
        if: matrix.os_name == 'windows'
        shell: cmd
        run: call ch00-tech-prep\tests\ci\setup_windows_paths.cmd

      - name: Install System Dependencies (Linux)
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcurl4-openssl-dev libpng-dev libharfbuzz-dev libfribidi-dev pandoc

      - name: Install System Dependencies (macOS)
        if: matrix.os_name == 'macos'
        run: |
          brew install xquartz gettext gcc gfortran libpng pandoc
          brew link gettext --force

      - name: Install System Dependencies (Windows)
        if: matrix.os_name == 'windows'
        run: choco install pandoc

      - name: Setup Data and Paths
        shell: bash
        run: bash ch00-tech-prep/tests/ci/setup_data.sh --kind r --os-name "${{ matrix.os_name }}"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
            r-version: '4.5.2'

      - name: Configure R compilation (macOS)
        if: matrix.os_name == 'macos'
        run: bash ch00-tech-prep/tests/ci/configure_r_macos.sh

      - name: Restore R packages (renv)
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2
          bypass-cache: "never"

      - name: Run R script tests
        shell: bash
        env:
          R_TEST_TARGETS: ${{ steps.r-test-targets.outputs.targets }}
        run: |
          if [ "${{ steps.r-test-targets.outputs.run_all }}" = "true" ]; then
            bash ch00-tech-prep/tests/run_all_r.sh
          else
            targets=()
            while IFS= read -r target; do
              [ -n "$target" ] && targets+=("$target")
            done <<< "$R_TEST_TARGETS"

            if [ "${#targets[@]}" -eq 0 ]; then
              echo "No eligible R scripts selected."
              exit 0
            fi

            bash ch00-tech-prep/tests/run_all_r.sh "${targets[@]}"
          fi

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-r-test-outputs-${{ matrix.os_name }}
          path: |
            **/*.log
          retention-days: 7
