name: Test R Scripts

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.R'
      - '**/*.r'
      - 'renv.lock'
      - 'ch00-tech-prep/run_all_r.sh'
      - '.github/workflows/test_r_scripts.yml'
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.R'
      - '**/*.r'
      - 'renv.lock'
      - 'ch00-tech-prep/run_all_r.sh'
      - '.github/workflows/test_r_scripts.yml'
  workflow_dispatch:

jobs:
  test-r:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            os_name: linux
          - os: macos-14
            os_name: macos
          - os: windows-2022
            os_name: windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine R test targets
        id: r-test-targets
        shell: bash
        run: |
          set -euo pipefail

          run_all=false
          target_dirs_file="$RUNNER_TEMP/r_target_dirs.txt"
          changed_files_file="$RUNNER_TEMP/r_changed_files.txt"
          : > "$target_dirs_file"
          : > "$changed_files_file"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            run_all=true
          else
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.sha }}"
            else
              base="${{ github.event.before }}"
              head="${{ github.sha }}"
            fi

            if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
              git diff-tree --no-commit-id --name-only -r "$head" > "$changed_files_file"
            elif ! git diff --name-only "$base" "$head" > "$changed_files_file"; then
              echo "Could not diff $base..$head; running full R suite."
              run_all=true
            fi

            if [ "$run_all" = "false" ]; then
              while IFS= read -r file; do
                [ -z "$file" ] && continue

                case "$file" in
                  renv.lock|.github/workflows/test_r_scripts.yml|ch00-tech-prep/run_all_r.sh|ch00-tech-prep/*.R|ch00-tech-prep/*.r)
                    run_all=true
                    break
                    ;;
                  *.R|*.r)
                    dirname "$file" >> "$target_dirs_file"
                    ;;
                esac
              done < "$changed_files_file"
            fi
          fi

          if [ "$run_all" = "true" ]; then
            echo "run_all=true" >> "$GITHUB_OUTPUT"
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
            echo "R target mode: all"
          else
            sort -u "$target_dirs_file" -o "$target_dirs_file"

            if [ -s "$target_dirs_file" ]; then
              echo "run_all=false" >> "$GITHUB_OUTPUT"
              echo "has_targets=true" >> "$GITHUB_OUTPUT"
              {
                echo "targets<<EOF"
                cat "$target_dirs_file"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
              echo "R target directories:"
              cat "$target_dirs_file"
            else
              echo "run_all=false" >> "$GITHUB_OUTPUT"
              echo "has_targets=false" >> "$GITHUB_OUTPUT"
              echo "No eligible R scripts selected."
            fi
          fi

      - name: Setup Windows paths (Windows)
        if: matrix.os_name == 'windows'
        shell: cmd
        run: |
          REM The default checkout on Windows is D:\a\da_case_studies\da_case_studies
          REM Some scripts assume the repo lives at D:\a\da_case_studies
          REM Create junctions to align expected paths

          cd /d D:\a\da_case_studies

          for /d %%i in (da_case_studies\ch*) do mklink /J "%%~nxi" "%%i"
          for /d %%i in (da_case_studies\da*) do mklink /J "%%~nxi" "%%i"
          for /d %%i in (da_case_studies\pre*) do mklink /J "%%~nxi" "%%i"

          dir

      - name: Install System Dependencies (Linux)
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcurl4-openssl-dev libpng-dev libharfbuzz-dev libfribidi-dev pandoc

      - name: Install System Dependencies (macOS)
        if: matrix.os_name == 'macos'
        run: |
          brew install xquartz gettext gcc gfortran libpng pandoc
          brew link gettext --force

      - name: Install System Dependencies (Windows)
        if: matrix.os_name == 'windows'
        run: choco install pandoc

      - name: Setup Data and Paths
        shell: bash
        run: |
          REPO_DIR="${{ github.workspace }}"
          PARENT_DIR=$(dirname "$REPO_DIR")
          cd "$REPO_DIR"

          # 1. Download and extract da_data_repo
          curl -sL "https://files.osf.io/v1/resources/3u5em/providers/osfstorage/?zip=" -o data.zip
          unzip -q data.zip && unzip -q da_data_repo.zip

          # 2. Move da_data_repo to parent directory (sibling of da_case_studies)
          rm -rf "$PARENT_DIR/da_data_repo"
          mv da_data_repo "$PARENT_DIR/"

          # 3. Cleanup
          rm data.zip da_data_repo.zip
          rm -rf __MACOSX

          # 4. Create set-data-directory.R from example
          cp ch00-tech-prep/set-data-directory-example.R ch00-tech-prep/set-data-directory.R

          # 5. Export data path for reference (optional)
          echo "DA_DATA_DIR=$PARENT_DIR/da_data_repo" >> "$GITHUB_ENV"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
            r-version: '4.5.2'

      - name: Configure R compilation (macOS)
        if: matrix.os_name == 'macos'
        run: |
          GETTEXT_DIR=$(brew --prefix gettext)
          LIBPNG_DIR=$(brew --prefix libpng)
          mkdir -p ~/.R
          cat > ~/.R/Makevars << EOF
          LDFLAGS=-L${GETTEXT_DIR}/lib -L${LIBPNG_DIR}/lib
          CPPFLAGS=-I${GETTEXT_DIR}/include -I${LIBPNG_DIR}/include
          EOF
          cat ~/.R/Makevars

      - name: Restore R packages (renv)
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2
          bypass-cache: "never"

      - name: Run R script tests
        shell: bash
        env:
          R_TEST_TARGETS: ${{ steps.r-test-targets.outputs.targets }}
        run: |
          if [ "${{ steps.r-test-targets.outputs.run_all }}" = "true" ]; then
            bash ch00-tech-prep/run_all_r.sh
          else
            targets=()
            while IFS= read -r target; do
              [ -n "$target" ] && targets+=("$target")
            done <<< "$R_TEST_TARGETS"

            if [ "${#targets[@]}" -eq 0 ]; then
              echo "No eligible R scripts selected."
              exit 0
            fi

            bash ch00-tech-prep/run_all_r.sh "${targets[@]}"
          fi

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-r-test-outputs-${{ matrix.os_name }}
          path: |
            **/*.log
          retention-days: 7
