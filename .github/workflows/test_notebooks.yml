name: Test Notebooks

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.py'
      - '**/*.ipynb'
      - '.github/workflows/test_notebooks.yml'
      - '.python-version'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.py'
      - '**/*.ipynb'
      - '.github/workflows/test_notebooks.yml'
      - '.python-version'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:  # Allows manual triggering

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            os_name: linux
          - os: macos-14
            os_name: macos
          - os: windows-2022
            os_name: windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine notebook test targets
        id: notebook-test-targets
        shell: bash
        run: |
          set -euo pipefail

          run_all=false
          target_dirs_file="$RUNNER_TEMP/notebook_target_dirs.txt"
          changed_files_file="$RUNNER_TEMP/notebook_changed_files.txt"
          : > "$target_dirs_file"
          : > "$changed_files_file"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            run_all=true
          else
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.sha }}"
            else
              base="${{ github.event.before }}"
              head="${{ github.sha }}"
            fi

            if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
              git diff-tree --no-commit-id --name-only -r "$head" > "$changed_files_file"
            elif ! git diff --name-only "$base" "$head" > "$changed_files_file"; then
              echo "Could not diff $base..$head; running full notebook suite."
              run_all=true
            fi

            if [ "$run_all" = "false" ]; then
              while IFS= read -r file; do
                [ -z "$file" ] && continue

                case "$file" in
                  .python-version|pyproject.toml|uv.lock|.github/workflows/test_notebooks.yml|ch00-tech-prep/*.py)
                    run_all=true
                    break
                    ;;
                  *.ipynb|*.py)
                    dirname "$file" >> "$target_dirs_file"
                    ;;
                esac
              done < "$changed_files_file"
            fi
          fi

          if [ "$run_all" = "true" ]; then
            echo "run_all=true" >> "$GITHUB_OUTPUT"
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
            echo "Notebook target mode: all"
          else
            sort -u "$target_dirs_file" -o "$target_dirs_file"

            if [ -s "$target_dirs_file" ]; then
              echo "run_all=false" >> "$GITHUB_OUTPUT"
              echo "has_targets=true" >> "$GITHUB_OUTPUT"
              {
                echo "targets<<EOF"
                cat "$target_dirs_file"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
              echo "Notebook target directories:"
              cat "$target_dirs_file"
            else
              echo "run_all=false" >> "$GITHUB_OUTPUT"
              echo "has_targets=false" >> "$GITHUB_OUTPUT"
              echo "No eligible notebooks selected."
            fi
          fi

      - name: Setup Windows paths (Windows)
        if: matrix.os_name == 'windows'
        shell: cmd
        run: |
          REM The default checkout on Windows is D:\a\da_case_studies\da_case_studies
          REM The notebook code uses split("da_case_studies")[0] which gets D:\a\
          REM Then it looks for D:\a\da_case_studies\..., but the repo is at D:\a\da_case_studies\da_case_studies
          REM
          REM Fix: Create junction points from D:\a\da_case_studies\chXX to D:\a\da_case_studies\da_case_studies\chXX
          REM This way notebooks can write to the paths they expect
          
          cd /d D:\a\da_case_studies
          
          REM Create junctions for all chapter directories
          for /d %%i in (da_case_studies\ch*) do mklink /J "%%~nxi" "%%i"
          for /d %%i in (da_case_studies\da*) do mklink /J "%%~nxi" "%%i"
          for /d %%i in (da_case_studies\pre*) do mklink /J "%%~nxi" "%%i"
          
          dir

      - name: Install System Dependencies (Linux)
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install System Dependencies (macOS)
        if: matrix.os_name == 'macos'
        run: brew install graphviz libomp

      - name: Install System Dependencies (Windows)
        if: matrix.os_name == 'windows'
        run: choco install graphviz

      - name: Setup Data and Paths
        shell: bash
        run: |
          REPO_DIR="${{ github.workspace }}"
          cd "$REPO_DIR"
          
          # 1. Download and extract
          curl -sL "https://files.osf.io/v1/resources/3u5em/providers/osfstorage/?zip=" -o data.zip
          unzip -q data.zip && unzip -q da_data_repo.zip
          
          # Determine target directory for da_data_repo (grandparent of workspace)
          REPO_DIR_NORMALIZED=$(echo "$REPO_DIR" | sed 's|\\|/|g')
          
          if [ "${{ matrix.os_name }}" == "windows" ]; then
            TARGET_ROOT="/d/a"
          else
            PARENT=$(dirname "$REPO_DIR_NORMALIZED")
            TARGET_ROOT=$(dirname "$PARENT")
          fi
          
          # 3. Move da_data_repo to the target directory
          rm -rf "$TARGET_ROOT/da_data_repo"
          mv da_data_repo "$TARGET_ROOT/"
          
          # 4. Cleanup
          rm data.zip da_data_repo.zip
          rm -rf __MACOSX
          
          # 5. Symlinks (Unix only)
          if [ "${{ matrix.os_name }}" != "windows" ]; then
            cd "$PARENT"
            ln -s da_case_studies/ch* . || true
            ln -s da_case_studies/da* . || true
            ln -s da_case_studies/pre* . || true
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.20"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install

      - name: Verify lockfile
        run: uv lock --check

      - name: Sync Python environment
        run: uv sync --frozen

      - name: Verify compiled Python dependencies
        run: uv run --frozen python -c "import xgboost"

      - name: Run notebook tests with uv
        shell: bash
        env:
          MPLBACKEND: Agg
          NOTEBOOK_TEST_TARGETS: ${{ steps.notebook-test-targets.outputs.targets }}
        run: |
          if [ "${{ steps.notebook-test-targets.outputs.run_all }}" = "true" ]; then
            uv run --frozen python ch00-tech-prep/run_all_python.py
          else
            targets=()
            while IFS= read -r target; do
              [ -n "$target" ] && targets+=("$target")
            done <<< "$NOTEBOOK_TEST_TARGETS"

            if [ "${#targets[@]}" -eq 0 ]; then
              echo "No eligible notebooks selected."
              exit 0
            fi

            uv run --frozen python ch00-tech-prep/run_all_python.py "${targets[@]}"
          fi

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-test-outputs-${{ matrix.os_name }}
          path: |
            **/*.log
          retention-days: 7
