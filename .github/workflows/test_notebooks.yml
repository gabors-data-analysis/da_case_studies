name: Test Notebooks

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.py'
      - '**/*.ipynb'
      - '.github/workflows/test_notebooks.yml'
      - '.python-version'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'ch00-tech-prep/tests/ci/**'
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.py'
      - '**/*.ipynb'
      - '.github/workflows/test_notebooks.yml'
      - '.python-version'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'ch00-tech-prep/tests/ci/**'
  workflow_dispatch:  # Allows manual triggering

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            os_name: linux
          - os: macos-14
            os_name: macos
          - os: windows-2022
            os_name: windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine notebook test targets
        id: notebook-test-targets
        shell: bash
        run: |
          python_cmd=python3
          if ! command -v "$python_cmd" >/dev/null 2>&1; then
            python_cmd=python
          fi
          "$python_cmd" ch00-tech-prep/tests/ci/select_test_targets.py \
            --kind notebooks \
            --event-name "${{ github.event_name }}" \
            --base "${{ github.event.pull_request.base.sha || github.event.before }}" \
            --head "${{ github.sha }}" \
            >> "$GITHUB_OUTPUT"

      - name: Setup Windows paths (Windows)
        if: matrix.os_name == 'windows'
        shell: cmd
        run: call ch00-tech-prep\tests\ci\setup_windows_paths.cmd

      - name: Install System Dependencies (Linux)
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install System Dependencies (macOS)
        if: matrix.os_name == 'macos'
        run: brew install graphviz libomp

      - name: Install System Dependencies (Windows)
        if: matrix.os_name == 'windows'
        run: choco install graphviz

      - name: Setup Data and Paths
        shell: bash
        run: bash ch00-tech-prep/tests/ci/setup_data.sh --kind python --os-name "${{ matrix.os_name }}"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.20"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install

      - name: Verify lockfile
        run: uv lock --check

      - name: Sync Python environment
        run: uv sync --frozen

      - name: Verify compiled Python dependencies
        run: uv run --frozen python -c "import xgboost"

      - name: Run notebook tests with uv
        shell: bash
        env:
          MPLBACKEND: Agg
          NOTEBOOK_TEST_TARGETS: ${{ steps.notebook-test-targets.outputs.targets }}
        run: |
          if [ "${{ steps.notebook-test-targets.outputs.run_all }}" = "true" ]; then
            uv run --frozen python ch00-tech-prep/tests/run_all_python.py
          else
            targets=()
            while IFS= read -r target; do
              [ -n "$target" ] && targets+=("$target")
            done <<< "$NOTEBOOK_TEST_TARGETS"

            if [ "${#targets[@]}" -eq 0 ]; then
              echo "No eligible notebooks selected."
              exit 0
            fi

            uv run --frozen python ch00-tech-prep/tests/run_all_python.py "${targets[@]}"
          fi

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-test-outputs-${{ matrix.os_name }}
          path: |
            **/*.log
          retention-days: 7
